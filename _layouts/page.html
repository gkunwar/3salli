---
layout: default
---
{% assign t = site.data.strings[page.lang] %}
<article class="page">
  <header class="page-hero">
    <p class="eyebrow">{{ t.brand }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.lede %}
    <p class="lede">{{ page.lede }}</p>
    {% endif %}
  </header>
  <div class="page-body">
    {{ content }}
  </div>
</article>
