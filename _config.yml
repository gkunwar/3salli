title: तीन सल्ली भागवती मन्दिर
title_en: Teen Salli Bhagwati Temple
email: ""
description: >-
  तीन सल्ली भागवती मन्दिर — अर्घाखाँची, मलारानी–२, गर्छा।
  Teen Salli Bhagwati Temple in Arghakhanchi, Malarani-2, Garchha, Lumbini Province, Nepal.
baseurl: "/3salli"
url: "https://gkunwar.github.io"

# Temple map location (Tinsalli Temple, Garchha)
map:
  lat: 28.0650315
  lng: 83.1723049
  zoom: 15
  link: "https://maps.app.goo.gl/RrfdL3BzPYKb9e789"

markdown: kramdown
# Custom theme layouts in _layouts
theme: null
plugins:
  - jekyll-feed

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: "ne"
    values:
      lang: ne
  - scope:
      path: "en"
    values:
      lang: en

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
