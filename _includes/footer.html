{% assign t = site.data.strings[page.lang] %}
<footer class="site-footer">
  <div class="site-footer-inner">
    <div>
      <p class="footer-brand">{{ t.brand_full }}</p>
      <p class="footer-place">{{ t.location }} · {{ t.province }}</p>
    </div>
    <p class="footer-blessing">{{ t.footer_blessing }}</p>
    <p class="footer-note">{{ t.footer_note }}</p>
  </div>
</footer>
