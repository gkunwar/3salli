ne:
  lead: तीन सल्ली — तीन सल्ला र भगवती माताको आशीर्वादसँग जोडिएको थलो।
  sections:
    - title: नामको अर्थ
      body: >
        “तीन सल्ली” नाम स्थानीय पहिचानसँग जोडिएको छ — सल्लोका रुख र पहाडी परिदृश्यले घेरिएको यो थलो
        पुस्ताँैदेखि भगवती माताको पूजास्थलका रूपमा चिनिन्छ।
    - title: आस्था र समुदाय
      body: >
        मन्दिर केवल पूजाको स्थान मात्र होइन; चाडपर्व, सङ्गीत, र साझा जिम्मेवारीको केन्द्र पनि हो।
        गाउँलेहरूले मर्मत, सरसफाइ र अतिथि सत्कारमा सहयोग गर्छन्।
    - title: आजको यात्रा
      body: >
        आजका श्रद्धालुहरू दर्शनका लागि आउँछन्, मनोकामना राख्छन्, र मन्दिरको निरन्तरताका लागि सहयोग गर्छन्।
        यो वेबसाइटले कथा, इतिहास, दाता सम्मान र बाटोको जानकारी एकै ठाउँमा राख्ने प्रयास हो।
en:
  lead: Teen Salli — a shrine woven with pine hills and the blessing of Bhagwati Mata.
  sections:
    - title: Meaning of the name
      body: >
        “Teen Salli” is rooted in local identity — a place among pine trees and hill paths,
        known for generations as a seat of Bhagwati worship.
    - title: Faith and community
      body: >
        The temple is more than a shrine. It is where festivals, music, and shared duty meet.
        Villagers help with care, cleaning, and welcoming visitors.
    - title: The journey today
      body: >
        Devotees come for darshan, offer prayers, and support the temple’s future.
        This site gathers story, history, donor honour, and travel guidance in one place.
